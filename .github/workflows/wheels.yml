name: Build and Publish Wheels

on:
  push:
    tags:
      - 'v*'   # triggers on tags like v1.0.0, v2.1.3, etc.
  workflow_dispatch:

jobs:
  build-and-upload:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      # 1️⃣ Checkout code
      - uses: actions/checkout@v4

      # 2️⃣ Set up Python (needed for cibuildwheel)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"  # CI runner installs at least 3.10

      - name: Get release ID by tag
        id: get_release
        run: |
          RELEASE_ID=$(gh release view $GITHUB_REF_NAME --json id -q ".id")
          echo "release_id=$RELEASE_ID" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ github.token }}


      # 3️⃣ Install cibuildwheel and build tools
      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel pybind11 cibuildwheel

      # 4️⃣ Build manylinux wheels
      - name: Build wheels
        env:
          CIBW_BUILD: "cp310-* cp311-* cp312-* cp313-*"
        run: python -m cibuildwheel --output-dir wheelhouse --platform ${{ matrix.os == 'macos-latest' && 'macos' || 'linux' }}

      # 5️⃣ List wheels
      - name: List generated wheels
        run: ls -l wheelhouse/


      - name: Upload wheel to release
        uses: actions/upload-release-asset@v1
        with:
          upload_url: https://uploads.github.com/repos/${{ github.repository }}/releases/${{ steps.get_release.outputs.release_id }}/assets{?name,label}
          asset_path: wheelhouse/my_package-0.1.0-py3-none-any.whl
          asset_name: my_package-0.1.0-py3-none-any.whl
          asset_content_type: application/octet-stream
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}